name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend package (editable, with dev extras)
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check app tests

      # The full suite is hermetic: tests spin up their own in-memory SQLite
      # engines and the vector store defaults to an in-memory fake unless a
      # real Qdrant is configured. apps/api/.env is gitignored, so no real
      # service URLs can leak into CI. Run everything, no filters, no skips.
      - name: Pytest (full suite)
        run: python -m pytest -q

  frontend:
    name: Frontend (tsc --noEmit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies (lockfile-exact)
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

# Follow-up (out of scope for this slice): Playwright e2e tests require a live
# backend + Postgres + Qdrant + LLM stack and are intentionally NOT run here.
