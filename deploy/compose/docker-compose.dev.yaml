services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentforge
      POSTGRES_USER: agentforge
      POSTGRES_PASSWORD: agentforge
    ports:
      - "${AGENT_FORGE_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentforge -d agentforge"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: agentforge
      MINIO_ROOT_PASSWORD: agentforge-local
    ports:
      - "${AGENT_FORGE_MINIO_API_PORT:-9000}:9000"
      - "${AGENT_FORGE_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${AGENT_FORGE_QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  api:
    build:
      context: ../../apps/api
    environment:
      AGENT_FORGE_DATABASE_URL: postgresql+psycopg://agentforge:agentforge@postgres:5432/agentforge
      AGENT_FORGE_READINESS_CHECK_DATABASE: "true"
      AGENT_FORGE_CORS_ORIGINS: '["http://localhost:${AGENT_FORGE_WEB_PORT:-3000}","http://127.0.0.1:${AGENT_FORGE_WEB_PORT:-3000}"]'
      AGENT_FORGE_OBJECT_STORAGE_BACKEND: minio
      AGENT_FORGE_OBJECT_STORAGE_BUCKET: agent-forge-documents
      AGENT_FORGE_S3_ENDPOINT_URL: http://minio:9000
      AGENT_FORGE_S3_ACCESS_KEY_ID: agentforge
      AGENT_FORGE_S3_SECRET_ACCESS_KEY: agentforge-local
      AGENT_FORGE_VECTOR_STORE_BACKEND: ${AGENT_FORGE_VECTOR_STORE_BACKEND:-fake}
      AGENT_FORGE_QDRANT_URL: http://qdrant:6333
      AGENT_FORGE_QDRANT_COLLECTION: agentforge_chunks
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "${AGENT_FORGE_API_PORT:-8000}:8000"
    volumes:
      - ../../apps/api/app:/app/app
      - ../../apps/api/alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_started

  web:
    build:
      context: ../../apps/web
    environment:
      NEXT_PUBLIC_AGENT_FORGE_API_BASE_URL: http://localhost:${AGENT_FORGE_API_PORT:-8000}/api/v1
    command: npm run dev
    ports:
      - "${AGENT_FORGE_WEB_PORT:-3000}:3000"
    volumes:
      - ../../apps/web/app:/app/app
    depends_on:
      - api

volumes:
  postgres-data:
  minio-data:
  qdrant-data:
